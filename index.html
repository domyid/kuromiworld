<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Kuromi: Avatar World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fce7f3;
            overflow: hidden; /* Prevent body scroll */
            touch-action: none; /* Prevent pinch zoom */
            transition: filter 0.5s ease, background-color 0.5s ease;
        }

        /* Mode Mati Lampu */
        body.dark-mode #world {
            filter: brightness(0.4) !important;
        }
        body.dark-mode {
            background-color: #1f2937;
        }

        /* Area Game yang bisa di-scroll Horizontal */
        #world-scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iOS */
            cursor: grab;
        }
        
        #world-scroll-container:active {
            cursor: grabbing;
        }

        /* Karakter yang bisa didrag */
        .draggable {
            cursor: grab;
            touch-action: none; /* Penting untuk drag di HP */
            user-select: none;
            -webkit-user-select: none;
        }
        .draggable:active {
            cursor: grabbing;
        }

        /* Furniture styling */
        .furniture {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            user-select: none;
            transition: transform 0.2s;
        }
        .furniture.interactive:hover {
            transform: scale(1.05);
            cursor: pointer;
            filter: drop-shadow(0 0 8px rgba(236, 72, 153, 0.5));
        }

        /* Sembunyikan scrollbar agar lebih rapi */
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-track { background: #fdf2f8; }
        ::-webkit-scrollbar-thumb { background: #f472b6; border-radius: 10px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative select-none">

    <!-- Header / UI Atas -->
    <header class="bg-pink-400 text-white p-3 shadow-md flex justify-between items-center z-50 shrink-0 border-b-4 border-pink-500">
        <h1 class="text-xl md:text-2xl font-black tracking-widest drop-shadow-md">🎀 KUROMI WORLD 🎀</h1>
        <div class="flex gap-2">
            <button onclick="toggleLampu()" class="bg-yellow-300 hover:bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold shadow transition transform hover:scale-105 active:scale-95">
                💡 Saklar Listrik
            </button>
            <button onclick="resetCharacters()" class="bg-white hover:bg-gray-100 text-pink-600 px-4 py-2 rounded-full font-bold shadow transition transform hover:scale-105 active:scale-95">
                🔄 Kembalikan Karakter
            </button>
        </div>
    </header>

    <!-- Pemandangan Luar Jendela (Latar Belakang Parallax) -->
    <div class="absolute inset-0 bg-blue-200 z-0 top-[60px]" id="sky">
        <div class="absolute top-10 text-6xl opacity-50" style="left: 10%;">☁️</div>
        <div class="absolute top-20 text-6xl opacity-50" style="left: 50%;">☁️</div>
        <div class="absolute top-5 text-6xl opacity-50" style="left: 80%;">☁️</div>
        <div class="absolute top-10 right-20 text-yellow-400 text-8xl drop-shadow-[0_0_20px_rgba(250,204,21,1)]" id="sun-moon">☀️</div>
    </div>

    <!-- MAIN WORLD: Bisa di-scroll ke kiri dan kanan -->
    <main id="world-scroll-container" class="flex-1 relative z-10">
        <!-- The House (Sangat Lebar) -->
        <div id="world" class="h-full flex items-end pb-[100px] px-8 gap-4 min-w-[2000px] relative transition-all duration-500">
            
            <!-- LANTAI -->
            <div class="absolute bottom-[100px] left-0 right-0 h-4 bg-pink-300 z-0 border-t-2 border-pink-400"></div>
            
            <!-- ROOM 1: Kamar Tidur Kuromi -->
            <div class="w-[850px] h-[70%] bg-pink-100/90 backdrop-blur-sm rounded-t-3xl border-4 border-b-0 border-pink-300 relative shadow-2xl shrink-0 overflow-hidden">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-pink-500 text-sm">🛏️ Kamar Tidur Kuromi & Teman-Teman</div>
                <!-- Jendela -->
                <div class="absolute top-12 left-1/4 -translate-x-1/2 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                <div class="absolute top-12 left-3/4 -translate-x-1/2 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                
                <!-- Furniture: 6 Kasur -->
                <div class="furniture interactive bg-pink-200 w-28 h-20 rounded-2xl border-4 border-pink-300 bottom-4 left-4 shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-pink-600 mt-[-5px]">🛏️ 1</span>
                </div>
                <div class="furniture interactive bg-purple-200 w-28 h-20 rounded-2xl border-4 border-purple-300 bottom-4 left-[140px] shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-purple-600 mt-[-5px]">🛏️ 2</span>
                </div>
                <div class="furniture interactive bg-blue-200 w-28 h-20 rounded-2xl border-4 border-blue-300 bottom-4 left-[260px] shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-blue-600 mt-[-5px]">🛏️ 3</span>
                </div>
                <div class="furniture interactive bg-green-200 w-28 h-20 rounded-2xl border-4 border-green-300 bottom-4 left-[380px] shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-green-600 mt-[-5px]">🛏️ 4</span>
                </div>
                <div class="furniture interactive bg-yellow-200 w-28 h-20 rounded-2xl border-4 border-yellow-300 bottom-4 left-[500px] shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-yellow-600 mt-[-5px]">🛏️ 5</span>
                </div>
                <div class="furniture interactive bg-orange-200 w-28 h-20 rounded-2xl border-4 border-orange-300 bottom-4 left-[620px] shadow-lg flex-col" onclick="interact('bed')">
                    <span class="text-sm font-bold text-orange-600 mt-[-5px]">🛏️ 6</span>
                </div>

                <!-- Lemari -->
                <div class="furniture interactive bg-indigo-200 w-24 h-48 rounded-t-xl border-4 border-indigo-300 bottom-4 right-4 shadow-lg flex-col" onclick="interact('lemari')">
                    <span class="text-sm font-bold text-indigo-600">Lemari</span>
                    <span class="text-4xl mt-2">🚪</span>
                </div>
            </div>

            <!-- ROOM 2: Kamar Mandi -->
            <div class="w-[300px] h-[70%] bg-teal-50/90 backdrop-blur-sm rounded-t-3xl border-4 border-b-0 border-teal-200 relative shadow-2xl shrink-0 overflow-hidden">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-teal-600 text-sm">🛁 Kamar Mandi</div>
                <!-- Cermin -->
                <div class="absolute top-12 left-1/2 -translate-x-1/2 w-20 h-24 bg-blue-50 border-4 border-gray-300 rounded-full opacity-80"></div>
                <!-- Furniture -->
                <div class="furniture interactive bg-white w-32 h-20 rounded-b-3xl rounded-t-lg border-4 border-teal-100 bottom-4 right-4 shadow-lg flex flex-col" onclick="interact('bathtub')">
                    <span class="text-3xl mt-[-10px]">🫧</span>
                    <span class="text-xs font-bold text-teal-500 mt-1">Bathtub</span>
                </div>
                <div class="furniture interactive text-5xl bottom-4 left-4" onclick="interact('toilet')">🚽</div>
            </div>

            <!-- ROOM 3: Ruang Tamu -->
            <div class="w-[450px] h-[70%] bg-yellow-50/90 backdrop-blur-sm rounded-t-3xl border-4 border-b-0 border-yellow-200 relative shadow-2xl shrink-0 overflow-hidden">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-yellow-600 text-sm">🛋️ Ruang Tamu</div>
                <!-- TV -->
                <div class="absolute top-16 left-1/2 -translate-x-1/2 w-48 h-28 bg-gray-800 border-4 border-gray-900 rounded-xl shadow-lg flex items-center justify-center interactive" onclick="interact('tv')" id="tv-screen">
                    <span class="text-white font-bold text-sm">📺 Klik TV</span>
                </div>
                <!-- Sofa -->
                <div class="furniture bg-orange-200 w-64 h-20 rounded-3xl border-4 border-orange-300 bottom-4 left-1/2 -translate-x-1/2 shadow-lg flex items-center justify-center">
                    <span class="text-xl font-bold text-orange-700 opacity-50">Sofa Empuk</span>
                </div>
                <!-- Piano -->
                <div class="furniture interactive text-6xl bottom-4 right-8" onclick="interact('piano')">🎹</div>
            </div>

            <!-- ROOM 4: Dapur -->
            <div class="w-[350px] h-[70%] bg-orange-50/90 backdrop-blur-sm rounded-t-3xl border-4 border-b-0 border-orange-200 relative shadow-2xl shrink-0 overflow-hidden">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-orange-600 text-sm">🍳 Dapur</div>
                <!-- Kulkas -->
                <div class="furniture interactive bg-gray-100 w-24 h-48 rounded-xl border-4 border-gray-300 bottom-4 left-4 shadow-lg flex flex-col" onclick="interact('kulkas')">
                    <div class="w-full h-1/3 border-b-4 border-gray-300 bg-gray-50 flex items-center justify-center"><span class="text-xs font-bold text-gray-400">Freezer</span></div>
                    <div class="w-full h-2/3 flex items-center justify-center"><span class="text-4xl">🥶</span></div>
                </div>
                <!-- Meja Makan -->
                <div class="furniture bg-amber-600 w-40 h-16 rounded-t-xl bottom-4 right-4 shadow-lg flex items-start justify-center pt-2 relative">
                    <div class="absolute -top-6 text-3xl">🍕 🥤</div>
                    <span class="text-sm font-bold text-amber-200">Meja Makan</span>
                </div>
                <div class="furniture interactive text-5xl bottom-24 right-20" onclick="interact('kompor')">🥘</div>
            </div>

            <!-- HALAMAN / LUAR -->
            <div class="w-[300px] h-[70%] relative flex items-end justify-center shrink-0">
                <div class="furniture interactive text-8xl bottom-4" onclick="interact('mobil')">🚗</div>
            </div>

        </div>
    </main>

    <!-- TRAY KARAKTER (Bawah) -->
    <!-- Di sinilah avatar akan muncul. Tarik mereka ke atas (ke dalam world) -->
    <footer class="h-[120px] bg-white border-t-8 border-pink-400 shrink-0 z-50 flex flex-col shadow-[0_-10px_20px_rgba(0,0,0,0.1)] relative">
        <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-pink-400 text-white px-6 py-1 rounded-t-xl font-bold text-sm shadow-md">
            ⬇️ Seret Karakter ke Rumah ⬆️
        </div>
        <div id="character-tray" class="flex-1 flex items-center gap-4 px-6 overflow-x-auto">
            <!-- Karakter akan digenerate ke sini -->
        </div>
    </footer>

    <!-- Pesan Interaksi / Bubble Chat Tengah -->
    <div id="toast-message" class="fixed top-20 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border-4 border-pink-400 text-pink-600 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] transform -translate-y-20 opacity-0 transition-all duration-300 pointer-events-none text-xl">
        Selamat datang di Kuromi World!
    </div>

    <script>
        // State Permainan
        let isDarkMode = false;
        let tvOn = false;
        
        const characters = ['Romina', 'Koni', 'Gareco', 'Nyanmi', 'Chumic', 'Konmi', 'Wanmi', 'Bako', 'Collimo', 'Baku', 'Kuromi'];

        // Sprite Config (Sama seperti sebelumnya)
        const spriteImage = 'Dipindai_20260624-0934_page-0001.jpg';
        const charSprites = {
            'Kuromi': { size: '300%', pos: '46% 35%' },
            'Romina': { size: '350%', pos: '80% 35%' }, 
            'Koni': { size: '500%', pos: '43% 66%' }, 
            'Gareco': { size: '300%', pos: '5% 72%' }, 
            'Nyanmi': { size: '350%', pos: '18% 42%' },
            'Chumic': { size: '450%', pos: '26% 82%' }, 
            'Konmi': { size: '550%', pos: '52% 80%' }, 
            'Wanmi': { size: '450%', pos: '95% 72%' }, 
            'Bako': { size: '500%', pos: '92% 52%' },
            'Collimo': { size: '450%', pos: '82% 12%' }, 
            'Baku': { size: '250%', pos: '78% 75%' }
        };

        const tray = document.getElementById('character-tray');
        const world = document.getElementById('world');
        const worldScroll = document.getElementById('world-scroll-container');
        const toast = document.getElementById('toast-message');

        // ==== SISTEM DRAG AND DROP (Sentuh & Mouse) ====
        let highestZIndex = 100;

        function makeDraggable(element) {
            let startX = 0, startY = 0, initialX = 0, initialY = 0;
            let isDragging = false;

            // MOUSE EVENTS
            element.addEventListener('mousedown', dragStart);
            // TOUCH EVENTS
            element.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                // Jangan drag jika yang diklik bukan elemen karakter secara langsung (menghindari error)
                if (e.target.closest('.interactive')) return;

                e.preventDefault(); // Mencegah scrolling halaman saat men-drag karakter
                isDragging = true;
                
                // Pindahkan ke depan
                highestZIndex++;
                element.style.zIndex = highestZIndex;
                element.classList.add('scale-110', 'shadow-2xl', 'ring-4', 'ring-pink-400');

                // Dapatkan posisi awal sentuhan/mouse
                if (e.type === 'touchstart') {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                } else {
                    startX = e.clientX;
                    startY = e.clientY;
                }

                // JIKA elemen masih di dalam TRAY (Bawah), pindahkan elemen ke WORLD agar bisa bebas terbang
                if (element.parentElement.id === 'character-tray') {
                    const rect = element.getBoundingClientRect();
                    const worldRect = world.getBoundingClientRect();
                    
                    // Hitung posisi absolut di dalam world (memperhitungkan scroll)
                    initialX = rect.left - worldRect.left;
                    initialY = rect.top - worldRect.top;
                    
                    // Pindahkan div ke dalam world
                    world.appendChild(element);
                    element.style.position = 'absolute';
                    element.style.left = initialX + 'px';
                    element.style.top = initialY + 'px';
                } else {
                    // Jika sudah di world, ambil posisinya saat ini
                    initialX = parseFloat(element.style.left) || 0;
                    initialY = parseFloat(element.style.top) || 0;
                }

                document.addEventListener('mousemove', dragAction);
                document.addEventListener('touchmove', dragAction, { passive: false });
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function dragAction(e) {
                if (!isDragging) return;
                e.preventDefault(); // Cegah scroll saat sedang narik

                let currentX, currentY;

                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX;
                    currentY = e.touches[0].clientY;
                } else {
                    currentX = e.clientX;
                    currentY = e.clientY;
                }

                // Hitung pergeseran
                let dx = currentX - startX;
                let dy = currentY - startY;

                // Terapkan ke posisi elemen
                element.style.left = (initialX + dx) + 'px';
                element.style.top = (initialY + dy) + 'px';
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                
                element.classList.remove('scale-110', 'shadow-2xl', 'ring-4', 'ring-pink-400');
                
                document.removeEventListener('mousemove', dragAction);
                document.removeEventListener('touchmove', dragAction);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchend', dragEnd);

                // Tambahkan sedikit efek pantul (animasi jatuh) saat dilepas
                element.style.transition = 'transform 0.2s';
                element.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    element.style.transform = 'translateY(0)';
                    element.style.transition = 'none'; // hapus transisi agar drag lancar
                }, 200);
            }
        }

        // ==== INISIALISASI KARAKTER ====
        function spawnCharacters() {
            tray.innerHTML = ''; // Kosongkan tray
            characters.forEach(nama => {
                const charEl = document.createElement('div');
                charEl.className = 'draggable w-20 h-20 md:w-24 md:h-24 shrink-0 rounded-full bg-white border-4 border-pink-300 shadow-md relative flex items-center justify-center group touch-none';
                charEl.dataset.name = nama;
                
                // Gambar wajah (CSS Sprite)
                charEl.innerHTML = `
                    <div class="w-full h-full rounded-full bg-white" 
                         style="background-image: url('${spriteImage}'); background-size: ${charSprites[nama].size}; background-position: ${charSprites[nama].pos}; background-repeat: no-repeat;">
                    </div>
                    <div class="absolute -bottom-3 bg-white px-2 py-0.5 rounded-full text-xs font-bold text-gray-700 shadow border border-gray-200 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
                        ${nama}
                    </div>
                `;
                
                tray.appendChild(charEl);
                makeDraggable(charEl); // Jadikan elemen ini bisa diseret!
            });
        }

        // Fungsi Reset (Kembalikan semua ke Tray)
        window.resetCharacters = function() {
            const allChars = document.querySelectorAll('.draggable');
            allChars.forEach(char => {
                // Reset style absolut
                char.style.position = 'relative';
                char.style.left = 'auto';
                char.style.top = 'auto';
                char.style.zIndex = '10';
                
                // Kembalikan ke tray
                tray.appendChild(char);
            });
            showToast("Semua karakter kembali ke bawah! 👇", "text-blue-600");
        }

        // ==== FITUR INTERAKSI OBJEK ====
        function showToast(text, colorClass = "text-pink-600") {
            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border-4 border-pink-400 px-6 py-3 rounded-full font-bold shadow-2xl z-[100] transform transition-all duration-300 pointer-events-none text-xl ${colorClass}`;
            toast.innerHTML = text;
            toast.style.transform = "translate(-50%, 0)"; // Turun
            toast.style.opacity = "1";
            
            // Sembunyikan setelah 3 detik
            setTimeout(() => {
                toast.style.transform = "translate(-50%, -20px)"; // Naik
                toast.style.opacity = "0";
            }, 3000);
        }

        window.interact = function(objek) {
            switch(objek) {
                case 'bed': showToast("Zzz... Kasurnya empuk sekali! 😴", "text-blue-500"); break;
                case 'lemari': showToast("Ganti baju yang mana ya hari ini? 👗", "text-purple-600"); break;
                case 'bathtub': showToast("Byur! Mandi busa sangat menyegarkan! 🫧", "text-teal-500"); break;
                case 'toilet': showToast("Hayo, jangan lupa disiram! 🚽💦", "text-gray-600"); break;
                case 'tv': 
                    const tv = document.getElementById('tv-screen');
                    tvOn = !tvOn;
                    if(tvOn) {
                        tv.className = "absolute top-16 left-1/2 -translate-x-1/2 w-48 h-28 bg-blue-300 border-4 border-gray-900 rounded-xl shadow-[0_0_20px_rgba(59,130,246,0.8)] flex items-center justify-center interactive overflow-hidden";
                        tv.innerHTML = `<div class="w-full h-full bg-[url('https://placehold.co/200x100/3b82f6/ffffff?text=Kuromi+Show')] bg-cover animate-pulse"></div>`;
                        showToast("Nonton TV dulu ah! 📺🍿", "text-indigo-600");
                    } else {
                        tv.className = "absolute top-16 left-1/2 -translate-x-1/2 w-48 h-28 bg-gray-800 border-4 border-gray-900 rounded-xl shadow-lg flex items-center justify-center interactive";
                        tv.innerHTML = `<span class="text-gray-600 font-bold text-sm">TV Mati</span>`;
                    }
                    break;
                case 'piano': showToast("Ting ting tang! Main piano 🎹🎶", "text-purple-500"); break;
                case 'kulkas': showToast("Buka kulkas. Wah ada kue! 🍰", "text-blue-500"); break;
                case 'kompor': showToast("Ssst... Lagi masak sup enak! 🍲🔥", "text-orange-600"); break;
                case 'mobil': showToast("Brum brum! Jalan-jalan keliling kota! 🚗💨", "text-gray-800"); break;
            }
        }

        // Mati / Nyala Listrik
        window.toggleLampu = function() {
            isDarkMode = !isDarkMode;
            const sunMoon = document.getElementById('sun-moon');
            const sky = document.getElementById('sky');

            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                sunMoon.innerText = "🌙";
                sunMoon.className = "absolute top-10 right-20 text-blue-100 text-8xl drop-shadow-[0_0_20px_rgba(219,234,254,0.8)]";
                sky.className = "absolute inset-0 bg-indigo-900 z-0 top-[60px]";
                showToast("Malam tiba... (Mati Lampu) 🌌", "text-indigo-900");
            } else {
                document.body.classList.remove('dark-mode');
                sunMoon.innerText = "☀️";
                sunMoon.className = "absolute top-10 right-20 text-yellow-400 text-8xl drop-shadow-[0_0_20px_rgba(250,204,21,1)]";
                sky.className = "absolute inset-0 bg-blue-200 z-0 top-[60px]";
                showToast("Pagi hari yang cerah! ☀️", "text-yellow-600");
            }
        }

        // Jalankan saat pertama dimuat
        spawnCharacters();

        // Panduan awal
        setTimeout(() => showToast("Coba seret Kuromi ke atas kasur! ✨"), 1000);

    </script>
</body>
</html>
