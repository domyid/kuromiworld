<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Kuromi RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen" class="fixed inset-0 bg-pink-100 flex flex-col items-center justify-center z-[200] overflow-y-auto">
        <h1 class="text-4xl md:text-6xl font-black text-pink-600 mb-2 drop-shadow-lg text-center mt-8">🎀 DUNIA KUROMI 🎀</h1>
        <p class="text-xl text-pink-800 font-bold mb-8">Pilih Karaktermu!</p>
        
        <div id="character-selection" class="flex flex-wrap justify-center gap-6 max-w-4xl px-4 pb-10">
            <!-- Pilihan Karakter -->
        </div>
    </div>

    <!-- MAIN GAME -->
    <div id="game-container">
        
        <!-- UI Atas -->
        <header class="absolute top-0 left-0 right-0 bg-pink-400/90 text-white p-3 shadow-md flex justify-between items-center z-50 border-b-4 border-pink-500 backdrop-blur">
            <h1 class="text-xl font-black tracking-widest">DUNIA KUROMI RPG</h1>
            <button id="lampu-btn" class="bg-yellow-300 hover:bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold shadow-md transform hover:scale-105 active:scale-95">
                💡 Listrik
            </button>
        </header>

        <!-- Latar Belakang -->
        <div class="absolute inset-0 bg-blue-200 z-0 top-[60px] transition-colors duration-500" id="sky">
            <div class="absolute top-10 text-6xl opacity-50" style="left: 10%;">☁️</div>
            <div class="absolute top-20 text-6xl opacity-50" style="left: 50%;">☁️</div>
            <div class="absolute top-5 text-6xl opacity-50" style="left: 80%;">☁️</div>
            <div class="absolute top-10 right-20 text-yellow-400 text-8xl drop-shadow-[0_0_20px_rgba(250,204,21,1)] transition-all" id="sun-moon">☀️</div>
        </div>

        <div class="floor"></div>

        <!-- Dunia Game -->
        <div id="world">
            
            <!-- KAMAR TIDUR -->
            <div class="room bg-pink-100/90 border-pink-300 w-[1000px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-pink-500 text-sm">🛏️ Kamar Tidur</div>
                <!-- Jendela -->
                <div class="absolute top-12 left-1/4 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                <div class="absolute top-12 left-3/4 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                
                <!-- Interactables -->
                <div class="furniture interactable bottom-4 left-[100px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-pink-200 w-32 h-20 rounded-2xl border-4 border-pink-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-pink-600">Kasur 1</span>
                </div>
                
                <div class="furniture interactable bottom-4 left-[350px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-purple-200 w-32 h-20 rounded-2xl border-4 border-purple-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-purple-600">Kasur 2</span>
                </div>

                <div class="furniture interactable bottom-4 left-[600px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-blue-200 w-32 h-20 rounded-2xl border-4 border-blue-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-blue-600">Kasur 3</span>
                </div>

                <div class="furniture interactable bottom-4 right-10 flex-col" data-msg="Baju mana ya hari ini? 👗" data-action="lemari">
                    <div class="bg-indigo-200 w-32 h-48 rounded-t-xl border-4 border-indigo-300 shadow-lg flex items-center justify-center text-5xl">🚪</div>
                    <span class="text-lg mt-1 font-bold text-indigo-600">Lemari</span>
                </div>
            </div>

            <!-- KAMAR MANDI -->
            <div class="room bg-teal-50/90 border-teal-200 w-[500px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-teal-600 text-sm">🛁 Kamar Mandi</div>
                <div class="furniture interactable bottom-4 right-[50px] flex-col" data-msg="Byur! Segar sekali mandi busa! 🫧" data-action="bathtub">
                    <div class="bg-white w-40 h-24 rounded-b-3xl rounded-t-lg border-4 border-teal-100 shadow-lg flex items-center justify-center text-4xl">🫧</div>
                    <span class="text-lg mt-1 font-bold text-teal-500">Bathtub</span>
                </div>
                <div class="furniture interactable text-6xl bottom-4 left-[50px]" data-msg="Hayo, jangan lupa disiram! 🚽" data-action="toilet">🚽</div>
            </div>

            <!-- RUANG TAMU -->
            <div class="room bg-yellow-50/90 border-yellow-200 w-[700px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-yellow-600 text-sm">🛋️ Ruang Tamu</div>
                
                <div id="tv-obj" class="furniture interactable absolute top-20 left-1/2 -translate-x-1/2 w-64 h-36 bg-gray-800 border-4 border-gray-900 rounded-xl shadow-lg flex items-center justify-center" data-msg="Nonton TV dulu ah! 📺" data-action="tv">
                    <span class="text-white font-bold text-lg">TV Layar Datar</span>
                </div>

                <div class="furniture interactable bottom-4 left-[50px] flex-col" data-msg="Main piano Ting Ting Tang! 🎹" data-action="piano">
                    <span class="text-7xl">🎹</span>
                </div>
                
                <div class="furniture interactable bg-orange-200 w-80 h-24 rounded-3xl border-4 border-orange-300 bottom-4 right-[50px] shadow-lg flex items-center justify-center" data-msg="Sofanya empuk sekali untuk duduk! 🛋️" data-action="sofa">
                    <span class="text-2xl font-bold text-orange-700 opacity-50">Sofa Panjang</span>
                </div>
            </div>

            <!-- DAPUR -->
            <div class="room bg-orange-50/90 border-orange-200 w-[600px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-orange-600 text-sm">🍳 Dapur</div>
                
                <div class="furniture interactable bottom-4 left-10 flex-col" data-msg="Wah ada es krim di dalam! 🍦" data-action="kulkas">
                    <div class="bg-gray-100 w-32 h-56 rounded-xl border-4 border-gray-300 shadow-lg flex flex-col">
                        <div class="w-full h-1/3 border-b-4 border-gray-300 flex items-center justify-center text-3xl">🥶</div>
                    </div>
                </div>

                <div class="furniture interactable text-6xl bottom-20 left-[250px]" data-msg="Lagi masak sup enak! 🍲" data-action="kompor">🥘</div>

                <div class="furniture interactable bottom-4 right-10 flex-col" data-msg="Nyam nyam! Pizza! 🍕" data-action="makan">
                    <div class="bg-amber-600 w-48 h-20 rounded-t-xl shadow-lg flex items-start justify-center pt-2 relative">
                        <div class="absolute -top-10 text-5xl">🍕🥤</div>
                    </div>
                </div>
            </div>

            <!-- HALAMAN LUAR -->
            <div class="room border-none shadow-none bg-transparent w-[500px] ml-10 flex items-end justify-center">
                <div class="furniture interactable text-9xl bottom-10" data-msg="Brum brum! Siap keliling kota! 🚗" data-action="mobil">🚗</div>
            </div>

            <!-- Tempat Player & NPC Muncul -->
            <div id="entities-container"></div>
        </div>

        <!-- Controls UI -->
        <div id="d-pad">
            <button class="d-btn" id="btn-up">⬆️</button>
            <button class="d-btn" id="btn-left">⬅️</button>
            <button class="d-btn" id="btn-right">➡️</button>
            <button class="d-btn" id="btn-down">⬇️</button>
        </div>

        <button id="action-btn">💬</button>

    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
