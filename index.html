<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dunia Kuromi RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #fce7f3;
            overflow: hidden;
            touch-action: none; /* Prevent pinch zoom */
            user-select: none;
            -webkit-user-select: none;
        }

        /* Mode Gelap */
        body.dark-mode #world { filter: brightness(0.4) !important; }
        body.dark-mode { background-color: #1f2937; }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Layar Utama */
        #world {
            position: absolute;
            height: 100%;
            display: flex;
            align-items: flex-end;
            padding-bottom: 150px; /* Space for floor */
            min-w-[2000px];
            transition: left 0.1s linear; /* Smooth camera follow */
            will-change: left;
        }

        .room {
            height: 70%;
            border: 4px solid;
            border-bottom: 0;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .floor {
            position: absolute;
            bottom: 130px;
            left: -1000px;
            right: -1000px;
            height: 20px;
            background-color: #f9a8d4;
            border-top: 4px solid #f472b6;
            z-index: 5;
        }

        /* Entitas (Player, NPC) */
        .entity {
            position: absolute;
            bottom: 20px; /* Base height above floor */
            width: 120px;
            height: 120px;
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: 20;
            transition: transform 0.1s;
        }

        .player {
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));
            z-index: 30;
        }

        /* Animasi Berjalan */
        @keyframes walk {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-10px) rotate(-5deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .walking {
            animation: walk 0.4s infinite;
        }
        .flip-x {
            transform: scaleX(-1);
        }

        /* Furniture */
        .furniture {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            z-index: 10;
        }

        /* D-Pad Controls */
        #d-pad {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
            z-index: 100;
        }
        .d-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 4px solid #f472b6;
            border-radius: 15px;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            color: #ec4899;
        }
        .d-btn:active {
            background: #fbcfe8;
            transform: scale(0.95);
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        /* Action Button */
        #action-btn {
            position: absolute;
            bottom: 50px;
            right: 50px;
            width: 100px;
            height: 100px;
            background: #f472b6;
            border: 6px solid #fff;
            border-radius: 50%;
            color: white;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            z-index: 100;
            display: none; /* Disembunyikan sampai ada interaksi */
        }
        #action-btn:active {
            transform: scale(0.9);
            background: #db2777;
        }

        /* UI Balon Chat */
        .chat-bubble {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 3px solid #f472b6;
            padding: 8px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 14px;
            color: #db2777;
            white-space: nowrap;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
        }
        .chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #f472b6 transparent transparent transparent;
        }
        .chat-bubble.show {
            opacity: 1;
        }

    </style>
</head>
<body>

    <!-- START SCREEN -->
    <div id="start-screen" class="fixed inset-0 bg-pink-100 flex flex-col items-center justify-center z-[200] overflow-y-auto">
        <h1 class="text-4xl md:text-6xl font-black text-pink-600 mb-2 drop-shadow-lg text-center mt-8">🎀 DUNIA KUROMI 🎀</h1>
        <p class="text-xl text-pink-800 font-bold mb-8">Pilih Karaktermu!</p>
        
        <div id="character-selection" class="flex flex-wrap justify-center gap-6 max-w-4xl px-4 pb-10">
            <!-- Pilihan Karakter -->
        </div>
    </div>

    <!-- MAIN GAME -->
    <div id="game-container">
        
        <!-- UI Atas -->
        <header class="absolute top-0 left-0 right-0 bg-pink-400/90 text-white p-3 shadow-md flex justify-between items-center z-50 border-b-4 border-pink-500 backdrop-blur">
            <h1 class="text-xl font-black tracking-widest">DUNIA KUROMI RPG</h1>
            <button onclick="toggleLampu()" class="bg-yellow-300 hover:bg-yellow-400 text-yellow-900 px-4 py-2 rounded-full font-bold shadow-md transform hover:scale-105 active:scale-95">
                💡 Listrik
            </button>
        </header>

        <!-- Latar Belakang -->
        <div class="absolute inset-0 bg-blue-200 z-0 top-[60px] transition-colors duration-500" id="sky">
            <div class="absolute top-10 text-6xl opacity-50" style="left: 10%;">☁️</div>
            <div class="absolute top-20 text-6xl opacity-50" style="left: 50%;">☁️</div>
            <div class="absolute top-5 text-6xl opacity-50" style="left: 80%;">☁️</div>
            <div class="absolute top-10 right-20 text-yellow-400 text-8xl drop-shadow-[0_0_20px_rgba(250,204,21,1)] transition-all" id="sun-moon">☀️</div>
        </div>

        <div class="floor"></div>

        <!-- Dunia Game -->
        <div id="world">
            
            <!-- KAMAR TIDUR -->
            <div class="room bg-pink-100/90 border-pink-300 w-[1000px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-pink-500 text-sm">🛏️ Kamar Tidur</div>
                <!-- Jendela -->
                <div class="absolute top-12 left-1/4 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                <div class="absolute top-12 left-3/4 w-32 h-24 bg-blue-100 border-4 border-white rounded-lg opacity-80"></div>
                
                <!-- Interactables -->
                <div class="furniture interactable bottom-4 left-[100px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-pink-200 w-32 h-20 rounded-2xl border-4 border-pink-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-pink-600">Kasur 1</span>
                </div>
                
                <div class="furniture interactable bottom-4 left-[350px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-purple-200 w-32 h-20 rounded-2xl border-4 border-purple-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-purple-600">Kasur 2</span>
                </div>

                <div class="furniture interactable bottom-4 left-[600px] flex-col" data-msg="Zzz... Kasur empuk 😴" data-action="bed">
                    <div class="bg-blue-200 w-32 h-20 rounded-2xl border-4 border-blue-300 shadow-lg"></div>
                    <span class="text-lg mt-1 font-bold text-blue-600">Kasur 3</span>
                </div>

                <div class="furniture interactable bottom-4 right-10 flex-col" data-msg="Baju mana ya hari ini? 👗" data-action="lemari">
                    <div class="bg-indigo-200 w-32 h-48 rounded-t-xl border-4 border-indigo-300 shadow-lg flex items-center justify-center text-5xl">🚪</div>
                    <span class="text-lg mt-1 font-bold text-indigo-600">Lemari</span>
                </div>
            </div>

            <!-- KAMAR MANDI -->
            <div class="room bg-teal-50/90 border-teal-200 w-[500px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-teal-600 text-sm">🛁 Kamar Mandi</div>
                <div class="furniture interactable bottom-4 right-[50px] flex-col" data-msg="Byur! Segar sekali mandi busa! 🫧" data-action="bathtub">
                    <div class="bg-white w-40 h-24 rounded-b-3xl rounded-t-lg border-4 border-teal-100 shadow-lg flex items-center justify-center text-4xl">🫧</div>
                    <span class="text-lg mt-1 font-bold text-teal-500">Bathtub</span>
                </div>
                <div class="furniture interactable text-6xl bottom-4 left-[50px]" data-msg="Hayo, jangan lupa disiram! 🚽" data-action="toilet">🚽</div>
            </div>

            <!-- RUANG TAMU -->
            <div class="room bg-yellow-50/90 border-yellow-200 w-[700px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-yellow-600 text-sm">🛋️ Ruang Tamu</div>
                
                <div id="tv-obj" class="furniture interactable absolute top-20 left-1/2 -translate-x-1/2 w-64 h-36 bg-gray-800 border-4 border-gray-900 rounded-xl shadow-lg flex items-center justify-center" data-msg="Nonton TV dulu ah! 📺" data-action="tv">
                    <span class="text-white font-bold text-lg">TV Layar Datar</span>
                </div>

                <div class="furniture interactable bottom-4 left-[50px] flex-col" data-msg="Main piano Ting Ting Tang! 🎹" data-action="piano">
                    <span class="text-7xl">🎹</span>
                </div>
                
                <div class="furniture interactable bg-orange-200 w-80 h-24 rounded-3xl border-4 border-orange-300 bottom-4 right-[50px] shadow-lg flex items-center justify-center" data-msg="Sofanya empuk sekali untuk duduk! 🛋️" data-action="sofa">
                    <span class="text-2xl font-bold text-orange-700 opacity-50">Sofa Panjang</span>
                </div>
            </div>

            <!-- DAPUR -->
            <div class="room bg-orange-50/90 border-orange-200 w-[600px] ml-10">
                <div class="absolute top-4 left-4 bg-white/70 px-3 py-1 rounded-full font-bold text-orange-600 text-sm">🍳 Dapur</div>
                
                <div class="furniture interactable bottom-4 left-10 flex-col" data-msg="Wah ada es krim di dalam! 🍦" data-action="kulkas">
                    <div class="bg-gray-100 w-32 h-56 rounded-xl border-4 border-gray-300 shadow-lg flex flex-col">
                        <div class="w-full h-1/3 border-b-4 border-gray-300 flex items-center justify-center text-3xl">🥶</div>
                    </div>
                </div>

                <div class="furniture interactable text-6xl bottom-20 left-[250px]" data-msg="Lagi masak sup enak! 🍲" data-action="kompor">🥘</div>

                <div class="furniture interactable bottom-4 right-10 flex-col" data-msg="Nyam nyam! Pizza! 🍕" data-action="makan">
                    <div class="bg-amber-600 w-48 h-20 rounded-t-xl shadow-lg flex items-start justify-center pt-2 relative">
                        <div class="absolute -top-10 text-5xl">🍕🥤</div>
                    </div>
                </div>
            </div>

            <!-- HALAMAN LUAR -->
            <div class="room border-none shadow-none bg-transparent w-[500px] ml-10 flex items-end justify-center">
                <div class="furniture interactable text-9xl bottom-10" data-msg="Brum brum! Siap keliling kota! 🚗" data-action="mobil">🚗</div>
            </div>

            <!-- Tempat Player & NPC Muncul -->
            <div id="entities-container"></div>
        </div>

        <!-- Controls UI -->
        <div id="d-pad">
            <button class="d-btn" id="btn-up">⬆️</button>
            <button class="d-btn" id="btn-left">⬅️</button>
            <button class="d-btn" id="btn-right">➡️</button>
            <button class="d-btn" id="btn-down">⬇️</button>
        </div>

        <button id="action-btn">💬</button>

    </div>

    <script>
        const characters = ['kuromi', 'romina', 'koni', 'gareco', 'nyanmi', 'chumi', 'konmi', 'wanmi', 'bako', 'collimo', 'baku'];
        
        let player = null;
        let npcs = [];
        let interactables = [];
        let currentFocus = null; // Object or NPC currently near the player
        
        // Game State
        const state = {
            x: 200, // Posisi X player di dunia
            y: 0,   // Posisi Y player (0 = lantai)
            speed: 5,
            isWalking: false,
            direction: 1, // 1 = Kanan, -1 = Kiri
            keys: { up: false, down: false, left: false, right: false }
        };

        const ui = {
            startScreen: document.getElementById('start-screen'),
            charSelect: document.getElementById('character-selection'),
            world: document.getElementById('world'),
            entities: document.getElementById('entities-container'),
            actionBtn: document.getElementById('action-btn'),
            tv: document.getElementById('tv-obj')
        };

        // Buat menu pilihan karakter
        characters.forEach(char => {
            const btn = document.createElement('button');
            btn.className = "w-32 h-32 md:w-40 md:h-40 bg-white border-4 border-pink-400 rounded-2xl shadow-xl flex flex-col items-center justify-center gap-2 transform hover:scale-105 active:scale-95 transition-all group overflow-hidden";
            btn.onclick = () => startGame(char);
            
            btn.innerHTML = `
                <img src="characters/${char}.png" alt="${char}" class="h-20 md:h-24 object-contain group-hover:scale-110 transition-transform">
                <span class="font-bold text-pink-600 capitalize bg-pink-100 px-3 py-1 rounded-full w-full text-center text-sm md:text-base">${char}</span>
            `;
            ui.charSelect.appendChild(btn);
        });

        // Kumpulkan semua objek interactable
        document.querySelectorAll('.interactable').forEach(el => {
            // Posisi dihitung nanti saat DOM sudah fully rendered
            interactables.push({
                el: el,
                msg: el.getAttribute('data-msg'),
                action: el.getAttribute('data-action')
            });
        });

        function startGame(selectedChar) {
            ui.startScreen.style.display = 'none';

            // Buat Player
            player = document.createElement('div');
            player.className = 'entity player';
            player.style.backgroundImage = `url('characters/${selectedChar}.png')`;
            
            // Balon Chat Player
            const chatBubble = document.createElement('div');
            chatBubble.className = 'chat-bubble';
            chatBubble.id = 'player-chat';
            player.appendChild(chatBubble);
            
            ui.entities.appendChild(player);

            // Buat NPC dari sisa karakter
            let npcXPos = 500;
            characters.forEach(char => {
                if (char === selectedChar) return;
                
                const npc = document.createElement('div');
                npc.className = 'entity';
                npc.style.backgroundImage = `url('characters/${char}.png')`;
                
                // Tambahkan sedikit variasi ukuran/posisi
                const npcY = Math.random() * 50; 
                npcXPos += 300 + Math.random() * 200; // Jarak antar NPC
                
                npc.style.left = npcXPos + 'px';
                npc.style.bottom = (20 + npcY) + 'px';

                // Balon Chat NPC
                const npcChat = document.createElement('div');
                npcChat.className = 'chat-bubble';
                npcChat.innerText = `Halo, aku ${char}! 👋`;
                npc.appendChild(npcChat);

                ui.entities.appendChild(npc);
                npcs.push({ el: npc, x: npcXPos, y: npcY, chat: npcChat, name: char });
            });

            // Mulai Game Loop
            requestAnimationFrame(gameLoop);
        }

        // --- KONTROL ---
        // Keyboard
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') state.keys.up = true;
            if (e.key === 'ArrowDown' || e.key === 's') state.keys.down = true;
            if (e.key === 'ArrowLeft' || e.key === 'a') state.keys.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd') state.keys.right = true;
            if (e.key === ' ' || e.key === 'Enter') triggerAction();
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') state.keys.up = false;
            if (e.key === 'ArrowDown' || e.key === 's') state.keys.down = false;
            if (e.key === 'ArrowLeft' || e.key === 'a') state.keys.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd') state.keys.right = false;
        });

        // D-Pad Touch / Mouse
        const setupBtn = (id, key) => {
            const btn = document.getElementById(id);
            const start = (e) => { e.preventDefault(); state.keys[key] = true; };
            const end = (e) => { e.preventDefault(); state.keys[key] = false; };
            btn.addEventListener('mousedown', start);
            btn.addEventListener('touchstart', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('touchend', end);
            btn.addEventListener('mouseleave', end);
        };

        setupBtn('btn-up', 'up');
        setupBtn('btn-down', 'down');
        setupBtn('btn-left', 'left');
        setupBtn('btn-right', 'right');

        ui.actionBtn.addEventListener('click', triggerAction);
        ui.actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); triggerAction(); });

        // --- GAME LOOP ---
        function gameLoop() {
            let moved = false;

            // Update Posisi
            if (state.keys.left) { state.x -= state.speed; state.direction = -1; moved = true; }
            if (state.keys.right) { state.x += state.speed; state.direction = 1; moved = true; }
            if (state.keys.up && state.y < 150) { state.y += state.speed * 0.7; moved = true; } // Limit gerak ke atas (kedalaman)
            if (state.keys.down && state.y > 0) { state.y -= state.speed * 0.7; moved = true; } // Limit lantai

            // Batas dunia kiri (kamar tidur)
            if (state.x < 50) state.x = 50;
            // Batas dunia kanan (halaman mobil)
            if (state.x > 3300) state.x = 3300; 

            // Render Player
            player.style.left = state.x + 'px';
            player.style.bottom = (20 + state.y) + 'px';
            
            // Animasi jalan & hadap
            if (moved) {
                if (!state.isWalking) {
                    player.classList.add('walking');
                    state.isWalking = true;
                }
            } else {
                if (state.isWalking) {
                    player.classList.remove('walking');
                    state.isWalking = false;
                }
            }
            
            // Flip gambar
            if (state.direction === -1) {
                player.classList.add('flip-x');
                // Unflip balon chat
                document.getElementById('player-chat').style.transform = "translateX(-50%) scaleX(-1)";
            } else {
                player.classList.remove('flip-x');
                document.getElementById('player-chat').style.transform = "translateX(-50%) scaleX(1)";
            }

            // Camera Follow (Geser dunia)
            const screenCenter = window.innerWidth / 2;
            let cameraX = screenCenter - state.x;
            
            // Limit camera panning
            if (cameraX > 0) cameraX = 0; // Kiri mentok
            // Max world width ~3500px
            const maxScroll = -(3500 - window.innerWidth);
            if (cameraX < maxScroll) cameraX = maxScroll;
            
            ui.world.style.left = cameraX + 'px';

            checkProximity();

            requestAnimationFrame(gameLoop);
        }

        // --- SISTEM INTERAKSI ---
        function checkProximity() {
            let found = null;
            const interactRange = 150;

            // Cek jarak dengan NPC
            for (let npc of npcs) {
                const dx = Math.abs(state.x - npc.x);
                if (dx < interactRange) {
                    found = { type: 'npc', data: npc };
                    break; // Cukup temukan satu terdekat
                }
            }

            // Cek jarak dengan objek
            if (!found) {
                for (let obj of interactables) {
                    const rect = obj.el.getBoundingClientRect();
                    const playerRect = player.getBoundingClientRect();
                    
                    // Jarak pusat ke pusat secara horizontal (X)
                    const objCenter = rect.left + rect.width / 2;
                    const playerCenter = playerRect.left + playerRect.width / 2;
                    
                    if (Math.abs(playerCenter - objCenter) < interactRange) {
                        found = { type: 'object', data: obj };
                        break;
                    }
                }
            }

            if (found) {
                if (currentFocus !== found.data) {
                    currentFocus = found.data;
                    currentFocus.type = found.type;
                    ui.actionBtn.style.display = 'flex';
                }
            } else {
                if (currentFocus) {
                    currentFocus = null;
                    ui.actionBtn.style.display = 'none';
                    // Sembunyikan bubble NPC jika menjauh
                    npcs.forEach(n => n.chat.classList.remove('show'));
                }
            }
        }

        function triggerAction() {
            if (!currentFocus) return;

            if (currentFocus.type === 'npc') {
                // Tampilkan chat NPC
                currentFocus.chat.classList.add('show');
                // Sembunyikan otomatis setelah 3 detik
                setTimeout(() => {
                    if (currentFocus && currentFocus.chat) {
                        currentFocus.chat.classList.remove('show');
                    }
                }, 3000);
            } else if (currentFocus.type === 'object') {
                showPlayerChat(currentFocus.msg);
                
                // Animasi khusus TV
                if (currentFocus.action === 'tv') {
                    const tv = ui.tv;
                    if (tv.classList.contains('tv-on')) {
                        tv.classList.remove('tv-on');
                        tv.innerHTML = `<span class="text-white font-bold text-lg">TV Layar Datar</span>`;
                        tv.className = "furniture interactable absolute top-20 left-1/2 -translate-x-1/2 w-64 h-36 bg-gray-800 border-4 border-gray-900 rounded-xl shadow-lg flex items-center justify-center";
                    } else {
                        tv.classList.add('tv-on');
                        tv.className = "furniture interactable absolute top-20 left-1/2 -translate-x-1/2 w-64 h-36 bg-blue-300 border-4 border-white rounded-xl shadow-[0_0_30px_rgba(59,130,246,0.8)] flex items-center justify-center overflow-hidden";
                        tv.innerHTML = `<div class="w-full h-full bg-[url('https://placehold.co/300x150/3b82f6/ffffff?text=Kuromi+Movie')] bg-cover animate-pulse"></div>`;
                    }
                }
            }
        }

        function showPlayerChat(msg) {
            const bubble = document.getElementById('player-chat');
            bubble.innerText = msg;
            bubble.classList.add('show');
            setTimeout(() => {
                bubble.classList.remove('show');
            }, 3000);
        }

        // --- SISTEM LAMPU ---
        let isDarkMode = false;
        function toggleLampu() {
            isDarkMode = !isDarkMode;
            const sunMoon = document.getElementById('sun-moon');
            const sky = document.getElementById('sky');

            if (isDarkMode) {
                document.body.classList.add('dark-mode');
                sunMoon.innerText = "🌙";
                sunMoon.className = "absolute top-10 right-20 text-blue-100 text-8xl drop-shadow-[0_0_20px_rgba(219,234,254,0.8)] transition-all duration-500";
                sky.className = "absolute inset-0 bg-indigo-900 z-0 top-[60px] transition-colors duration-500";
            } else {
                document.body.classList.remove('dark-mode');
                sunMoon.innerText = "☀️";
                sunMoon.className = "absolute top-10 right-20 text-yellow-400 text-8xl drop-shadow-[0_0_20px_rgba(250,204,21,1)] transition-all duration-500";
                sky.className = "absolute inset-0 bg-blue-200 z-0 top-[60px] transition-colors duration-500";
            }
        }
    </script>
</body>
</html>
